<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情缘宝宝你好呀</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffafbd, #ffc3a0);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            transition: background 0.5s;
        }
        
        .container {
            text-align: center;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            max-width: 90%;
            width: 500px;
            position: relative;
            transition: transform 0.3s;
        }
        
        h1 {
            color: #e84393;
            margin-bottom: 30px;
            font-size: 28px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        
        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        
        button {
            padding: 12px 30px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        
        #confirm-btn {
            background-color: #6c5ce7;
            color: white;
        }
        
        #confirm-btn:hover {
            background-color: #5b4cd4;
            transform: translateY(-3px);
        }
        
        #reject-btn {
            background-color: #fd79a8;
            color: white;
            transition: all 0.5s ease;
        }
        
        #reject-btn:hover {
            background-color: #e84393;
        }
        
        .message {
            display: none;
            margin-top: 30px;
            animation: fadeIn 1s;
        }
        
        .message h2 {
            color: #e84393;
            margin-bottom: 15px;
            font-size: 32px;
        }
        
        .emoji {
            font-size: 40px;
            margin: 15px 0;
        }
        
        .image-container {
            margin-top: 20px;
        }
        
        .image-container img {
            max-width: 200px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .hearts {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        
        .heart {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #fd79a8;
            transform: rotate(45deg);
            opacity: 0;
        }
        
        .heart:before, .heart:after {
            content: '';
            width: 20px;
            height: 20px;
            background-color: #fd79a8;
            border-radius: 50%;
            position: absolute;
        }
        
        .heart:before {
            top: -10px;
            left: 0;
        }
        
        .heart:after {
            top: 0;
            left: -10px;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes float {
            0% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-10px) rotate(5deg); }
            100% { transform: translateY(0) rotate(0); }
        }
        
        .floating {
            animation: float 3s ease-in-out infinite;
        }
        
        /* 响应式设计 */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            button {
                padding: 10px 20px;
                font-size: 16px;
            }
            
            .buttons {
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>你想做我的情缘吗？</h1>
        <div class="buttons">
            <button id="confirm-btn">确定</button>
            <button id="reject-btn">拒绝</button>
        </div>
        <div class="message" id="message">
            <h2>情缘宝宝你好呀</h2>
            <div class="emoji">(๑>ᴗ<๑) 贴贴~</div>
            <div class="image-container">
                <!-- 这里使用了一张可爱的贴贴图片 -->
                <img src="https://images.unsplash.com/photo-1518568814500-bf0f8d125f46?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60" alt="贴贴图片">
            </div>
        </div>
    </div>
    
    <div class="hearts" id="hearts"></div>

    <script>
        // 获取DOM元素
        const confirmBtn = document.getElementById('confirm-btn');
        const rejectBtn = document.getElementById('reject-btn');
        const message = document.getElementById('message');
        const heartsContainer = document.getElementById('hearts');
        const body = document.querySelector('body');
        const container = document.querySelector('.container');
        
        // 初始化拒绝按钮的尺寸和点击次数
        let rejectClickCount = 0;
        const initialRejectSize = 1; // 初始尺寸比例
        
        // 确定按钮点击事件
        confirmBtn.addEventListener('click', function() {
            // 隐藏问题和按钮
            document.querySelector('h1').style.display = 'none';
            document.querySelector('.buttons').style.display = 'none';
            
            // 显示消息和图片
            message.style.display = 'block';
            
            // 创建爱心动画
            createHearts();
            
            // 改变背景颜色
            body.style.background = 'linear-gradient(135deg, #a8edea, #fed6e3)';
            
            // 添加浮动效果到容器
            container.classList.add('floating');
        });
        
        // 拒绝按钮点击事件
        rejectBtn.addEventListener('click', function() {
            rejectClickCount++;
            
            // 减小按钮尺寸（每次点击减小10%）
            const newScale = Math.max(0.1, initialRejectSize - (rejectClickCount * 0.1));
            rejectBtn.style.transform = `scale(${newScale})`;
            
            // 随机移动拒绝按钮位置
            const maxX = window.innerWidth - rejectBtn.offsetWidth;
            const maxY = window.innerHeight - rejectBtn.offsetHeight;
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);
            
            rejectBtn.style.position = 'absolute';
            rejectBtn.style.left = `${randomX}px`;
            rejectBtn.style.top = `${randomY}px`;
            
            // 如果按钮太小，重置尺寸和位置
            if (newScale <= 0.1) {
                rejectClickCount = 0;
                rejectBtn.style.transform = 'scale(1)';
                rejectBtn.style.position = 'static';
            }
        });
        
        // 创建爱心动画函数
        function createHearts() {
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.classList.add('heart');
                    
                    // 随机位置
                    const left = Math.random() * 100;
                    heart.style.left = `${left}vw`;
                    
                    // 随机大小
                    const size = Math.random() * 20 + 10;
                    heart.style.width = `${size}px`;
                    heart.style.height = `${size}px`;
                    
                    // 随机颜色
                    const colors = ['#fd79a8', '#e84393', '#a29bfe', '#6c5ce7'];
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    heart.style.backgroundColor = color;
                    heart.querySelector = color;
                    
                    // 随机动画
                    const duration = Math.random() * 3 + 2;
                    heart.style.animation = `float ${duration}s ease-in-out infinite`;
                    
                    heartsContainer.appendChild(heart);
                    
                    // 移除爱心
                    setTimeout(() => {
                        heart.remove();
                    }, 5000);
                }, i * 100);
            }
        }
        
        // 添加一些初始爱心
        createHearts();
    </script>
</body>
</html>
